version: "3"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  dev:
    desc: Start development server
    cmds:
      - pnpm dev

  build:
    desc: Build for production
    cmds:
      - pnpm build

  lint:
    desc: Run ESLint
    cmds:
      - pnpm lint

  typecheck:
    desc: Run TypeScript type checking
    cmds:
      - pnpm typecheck

  format:
    desc: Format code with Prettier
    cmds:
      - pnpm format

  format:check:
    desc: Check code formatting
    cmds:
      - pnpm format:check

  db:migrate:
    desc: Run database migrations
    cmds:
      - pnpm db:migrate

  db:push:dev-only:
    desc: Push schema to a throwaway DEV database (NEVER against shared/prod — use db:migrate)
    cmds:
      - pnpm db:push:dev-only

  db:studio:
    desc: Open Prisma Studio
    cmds:
      - pnpm db:studio

  test:
    desc: Run unit tests
    cmds:
      - pnpm test

  setup:
    desc: Initial project setup
    cmds:
      - pnpm install
      - pnpm db:generate

  check:
    desc: Run all checks (typecheck, lint, test, format) — mirrors CI
    cmds:
      - pnpm typecheck
      - pnpm lint
      - pnpm test
      - pnpm format:check
