services:
  db:
    image: postgres:16-alpine
    container_name: getpaid_test_db
    environment:
      POSTGRES_DB: "getpaid_test"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
    tmpfs:
      - /var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
