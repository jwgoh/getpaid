name: integration

"on":
  push:
    branches: [master]
  pull_request:
    branches: [master]
    paths:
      - "src/server/**"
      - "src/shared/api/**"
      - "src/shared/config/**"
      - "src/shared/lib/**"
      - "src/shared/schemas/**"
      - "src/test/**"
      - "prisma/**"
      - "vitest.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - "docker-compose.test.yml"
      - ".github/workflows/integration.yml"

concurrency:
  group: integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  integration-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: getpaid_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm prisma generate

      - name: Apply migrations to test DB
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/getpaid_test
        run: pnpm prisma migrate deploy

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/getpaid_test
          DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/getpaid_test
          NEXTAUTH_SECRET: ci-secret-please-rotate
        run: pnpm test:integration
