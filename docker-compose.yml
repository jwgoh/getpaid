services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: "getpaid"
      POSTGRES_USER: "getpaid"
      POSTGRES_PASSWORD: "7EDdiFvbVHGcyBiY64sRJpBZ7D1q8BRzeJ1K35DXVk"
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-getpaid}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://getpaid:7EDdiFvbVHGcyBiY64sRJpBZ7D1q8BRzeJ1K35DXVk@db:5432/getpaid"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET:?NEXTAUTH_SECRET must be set — generate via: openssl rand -base64 32}"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3000}"
      AUTH_TRUST_HOST: "true"
      APP_URL: "${APP_URL:-http://localhost:3000}"
      # Optional: uncomment to enable email sending
      # RESEND_API_KEY: "${RESEND_API_KEY}"
      # EMAIL_FROM: "${EMAIL_FROM}"

volumes:
  pgdata:
